name: tasknet
description: TaskNet - School Management & Task Delegation System for Naga Central School II.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for FastAPI communication
  http: ^1.2.0

  # Icons
  cupertino_icons: ^1.0.6

  # Shared preferences (for storing JWT token locally)
  shared_preferences: ^2.2.2

  # Image network caching
  cached_network_image: ^3.3.1

  # Image picker (avatar upload)
  image_picker: ^1.1.2

  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

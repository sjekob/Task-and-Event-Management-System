version: "3.9"

# Run from the TaskNet-Testing root:
#   docker compose up --build
#
# Uses the primary FastAPI + SQLite backend by default.
# Set DATABASE_URL in backend/.env to switch to PostgreSQL.

services:

  # ── FastAPI (primary backend) ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasknet_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SECRET_KEY: ${SECRET_KEY:-tasknet-dev-secret-change-in-prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - tasknet_data:/app/uploads

volumes:
  tasknet_data:

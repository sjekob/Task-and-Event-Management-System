version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tasknet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tasknet_db
      POSTGRES_USER:     tasknet_user
      POSTGRES_PASSWORD: tasknet_pass
    ports:
      - "5432:5432"         # Expose to host for pgAdmin / direct access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasknet_user -d tasknet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasknet_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST:     db          # Use the service name, not localhost
      POSTGRES_PORT:     5432
      POSTGRES_DB:       tasknet_db
      POSTGRES_USER:     tasknet_user
      POSTGRES_PASSWORD: tasknet_pass
    ports:
      - "8000:8000"         # API accessible at http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app              # Live-reload: mount source code into container

  # ── pgAdmin (optional — remove if not needed) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tasknet_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@tasknet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"             # pgAdmin UI at http://localhost:5050
    depends_on:
      - db

volumes:
  postgres_data:
